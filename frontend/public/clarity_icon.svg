<svg width="360" height="360" viewBox="0 0 360 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Clarity Icon</title>
  <desc id="desc">A collaboration icon for Clarity showing two connected nodes meeting through a central clarity spark.</desc>

  <defs>
    <linearGradient id="clarityGradient" x1="86" y1="64" x2="284" y2="262" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.52" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>

    <filter id="softShadow" x="30" y="30" width="300" height="300" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="60" y="60" width="240" height="240" rx="64" fill="white"/>
  </g>

  <path d="M125 175 C150 128, 210 128, 235 175" stroke="#CBD5E1" stroke-width="14" stroke-linecap="round"/>
  <path d="M125 185 C150 232, 210 232, 235 185" stroke="#CBD5E1" stroke-width="14" stroke-linecap="round"/>

  <circle cx="124" cy="180" r="35" fill="#E0F2FE"/>
  <circle cx="124" cy="180" r="19" fill="#0284C7"/>

  <circle cx="236" cy="180" r="35" fill="#EDE9FE"/>
  <circle cx="236" cy="180" r="19" fill="#7C3AED"/>

  <circle cx="180" cy="180" r="52" fill="url(#clarityGradient)"/>
  <circle cx="180" cy="180" r="26" fill="white" fill-opacity="0.94"/>

  <path d="M180 142 L188.5 171.5 L218 180 L188.5 188.5 L180 218 L171.5 188.5 L142 180 L171.5 171.5 Z" fill="white"/>
  <path d="M180 158 L185 175 L202 180 L185 185 L180 202 L175 185 L158 180 L175 175 Z" fill="#2563EB"/>
</svg>
